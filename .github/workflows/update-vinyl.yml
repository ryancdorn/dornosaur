name: Update vinyl from Discogs

on:
  schedule:
    - cron: '17 11 * * *'  # daily at 11:17 UTC (~7:17am ET / ~4:17am PT)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-vinyl
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Refresh vinyl.json from Discogs
        env:
          DISCOGS_TOKEN: ${{ secrets.DISCOGS_TOKEN }}
        run: node scripts/update-vinyl.cjs

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain src/data/vinyl.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/vinyl.json
            git commit -m "chore(vinyl): auto-refresh from Discogs"
            git push
          else
            echo "No changes to vinyl.json"
          fi
